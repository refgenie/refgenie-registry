# Snakemake profile for Rivanna (UVA HPC) — refgenie asset builds.
#
# Used by build/run_builds.sh:  snakemake --profile build/profiles/rivanna/
# Requires snakemake >= 8 with the SLURM executor plugin
# (snakemake-executor-plugin-slurm), both present in the databio/lab bulker crate
# that the mobot job activates.
#
# Each rule becomes one SLURM job on the shefflab allocation. mobot dispatches
# this from a lightweight job; the heavy builds run as the SLURM jobs created
# here. Per design.md, resources come from THIS profile, not from recipes.

executor: slurm
jobs: 20                       # max concurrent SLURM jobs

# Global resource pool. genome_init declares refget_store_writer=1 (see the
# generated Snakefile), so this caps the workflow at ONE concurrent genome_init.
#
# Required for correctness, not for throughput. RefgetStore takes no file lock
# and rewrites collections.rgci and aliases/collections/refgenie.tsv wholesale
# from the state it loaded at open time, so concurrent inits are last-writer-wins.
# On 2026-07-23 four genome_inits were dispatched at the same second and
# athaliana lost the race: its collection file was written but dropped from both
# indexes, its alias stopped resolving, and the nightly failed at build_fasta
# with "Genome 'athaliana' not found". Neither init reported an error.
#
# Snakemake treats a custom resource with no declared budget as UNLIMITED, so
# removing this line silently restores the race.
resources:
  refget_store_writer: 1
latency-wait: 60               # tolerate shared-FS latency on output files
rerun-incomplete: true
keep-going: true               # one failed asset must not abort the batch
printshellcmds: true
use-singularity: false         # recipes run in containers via refgenie/bulker, not snakemake

# Default SLURM resources for every rule (shefflab standard partition).
# Override per-rule below for memory-hungry indexers.
default-resources:
  slurm_account: "shefflab"
  slurm_partition: "standard"
  mem_mb: 8000
  runtime: 120                 # minutes
  cpus_per_task: 4

# Per-rule resource overrides for the heavy indexers. Rule names match the
# generated Snakefile (build_<recipe>) and the genome_init sentinel rule.
set-resources:
  genome_init:
    mem_mb: 8000
    runtime: 60
  build_star_index:
    mem_mb: 64000
    runtime: 480
  build_cellranger_reference:
    mem_mb: 64000
    runtime: 480
  build_bwa_index:
    mem_mb: 16000
    runtime: 180
  build_hisat2_index:
    mem_mb: 32000
    runtime: 240
  build_bowtie2_index:
    mem_mb: 16000
    runtime: 180
  build_salmon_index:
    mem_mb: 16000
    runtime: 180
  # gt suffixerator on a full human genome under an 8 GB memlimit uses the slow
  # external-memory path; the default 120 min runtime TIMEOUTs (yeast is fine).
  # Give it the STAR-class window. (Raising the recipe's memlimit param would let
  # it run in-memory and faster, but that's a separate recipe/catalog change.)
  build_suffixerator_index:
    mem_mb: 32000
    runtime: 480

set-threads:
  build_star_index: 8
  build_cellranger_reference: 8
  build_hisat2_index: 8
  build_bowtie2_index: 4
  build_salmon_index: 4
  build_bwa_index: 4
