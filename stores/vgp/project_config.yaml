pep_version: 2.1.0
sample_table: sources.csv
sample_table_index: fasta

# Root for relative fasta paths in sources.csv ($REFGETSTORE_FASTA set by env.sh).
fasta_root: $REFGETSTORE_FASTA/vgp

# Sequence-alias strategy for build_aliases.py. All rows carry a GCA/GCF
# accession with NCBI FASTAs, so the assembly report gives the full
# RefSeq<->GenBank<->UCSC<->chrom-name web.
aliasing:
  seq_strategy: assembly_report
