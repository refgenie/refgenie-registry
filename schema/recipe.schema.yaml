$schema: https://json-schema.org/draft/2020-12/schema
$id: https://refgenie.org/schemas/recipe.schema.yaml
title: Refgenie Recipe
description: Schema for a build recipe in the refgenie-registry.
type: object
required:
  - name
  - version
  - description
  - produces
  - build
  - outputs
properties:
  name:
    type: string
    pattern: "^[a-zA-Z0-9_]+$"
    description: Recipe identifier (alphanumeric and underscores allowed).
  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: Semantic version of this recipe.
  description:
    type: string
    description: Human-readable description of what this recipe builds.
  produces:
    type: string
    pattern: "^[a-zA-Z0-9_]+$"
    description: >
      Name of the output asset class this recipe produces. Must reference
      an existing asset class definition (asset_classes/<name>.yaml).
  tags:
    type: array
    items:
      type: string
    description: Categorization tags (e.g., alignment, dna-seq).
  requires:
    type: object
    properties:
      assets:
        type: array
        items:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: >
                Name of a required input asset class (e.g., fasta). Must
                reference an existing asset class definition
                (asset_classes/<name>.yaml).
            description:
              type: string
              description: What this asset is used for.
            default:
              type: string
              description: >
                Default asset class to satisfy this input when none is
                specified (e.g., gencode_gtf for a generic gtf input).
          additionalProperties: false
        description: Assets that must exist before this recipe can build.
      files:
        type: array
        items:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: >
                Name of a required input file. Doubles as the build-command
                template variable (e.g., {dbsnp_vcf}).
            description:
              type: string
              description: What this file is used for.
          additionalProperties: false
        description: User-supplied input files that must be provided to build.
      tools:
        type: array
        items:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Tool name (e.g., bwa, samtools).
            version:
              type: string
              description: Version constraint (e.g., ">=0.7.17").
            source:
              type: string
              enum: [bioconda, conda-forge, pip, apt, manual]
              description: Where to install this tool from.
          additionalProperties: false
        description: External tools required for the build.
    additionalProperties: false
  build:
    type: object
    required:
      - command
    properties:
      setup:
        type: string
        description: Setup commands run before the main build.
      command:
        type: string
        description: >
          Main build command. Available variables:
          {fasta}, {output_dir}, {genome}, {threads}.
      resources:
        type: object
        properties:
          memory:
            type: string
            description: Estimated memory requirement (e.g., 8GB).
          disk:
            type: string
            description: Estimated disk requirement (e.g., 10GB).
          time:
            type: string
            description: Estimated wall time (e.g., 2h).
        additionalProperties: false
    additionalProperties: false
  outputs:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - pattern
      properties:
        pattern:
          type: string
          description: Glob pattern for expected output files.
        description:
          type: string
          description: What this output file is.
      additionalProperties: false
    description: Files produced by this recipe.
  test:
    type: object
    properties:
      commands:
        type: array
        items:
          type: string
        description: Commands to validate the build outputs.
      test_data:
        type: object
        additionalProperties:
          type: string
        description: >
          Named test data URLs. Keys become variable names
          available in test commands.
    additionalProperties: false
  metadata:
    type: object
    properties:
      author:
        type: string
        description: GitHub username of the recipe author.
      created:
        type: string
        format: date
        description: Date this recipe was created (YYYY-MM-DD).
      license:
        type: string
        description: License for this recipe (e.g., MIT).
      upstream_docs:
        type: string
        format: uri
        description: URL for the upstream tool documentation.
    additionalProperties: false
additionalProperties: false
