name: hg19
aliases:
  - GRCh37
  - GRCh37.p13

description: |
  Genome Reference Consortium Human Build 37 (patch 13).
  Legacy human reference genome. Still widely used by existing
  datasets (e.g., GTEx, TCGA) and many variant databases.

organism:
  scientific_name: Homo sapiens
  common_name: human
  taxon_id: 9606

assembly:
  source: NCBI
  accession: GCF_000001405.25
  level: chromosome

fasta:
  primary_url: https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.25_GRCh37.p13/GCF_000001405.25_GRCh37.p13_genomic.fna.gz
  mirrors:
    - https://hgdownload.soe.ucsc.edu/goldenPath/hg19/bigZips/hg19.fa.gz
    - https://ftp.ensembl.org/pub/grch37/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh37.dna.primary_assembly.fa.gz
  checksum:
    sha256: compute_on_registration

seqcol:
  compute: true

