name: mm39
aliases:
  - GRCm39

description: |
  Genome Reference Consortium Mouse Build 39.
  Current standard mouse reference genome. Successor to mm10/GRCm38
  with improved sequence accuracy, gap closures, and updated
  chromosome Y assembly.

organism:
  scientific_name: Mus musculus
  common_name: mouse
  taxon_id: 10090

assembly:
  source: NCBI
  accession: GCF_000001635.27
  level: chromosome

fasta:
  primary_url: https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/635/GCF_000001635.27_GRCm39/GCF_000001635.27_GRCm39_genomic.fna.gz
  mirrors:
    - https://hgdownload.soe.ucsc.edu/goldenPath/mm39/bigZips/mm39.fa.gz
    - https://ftp.ensembl.org/pub/release-113/fasta/mus_musculus/dna/Mus_musculus.GRCm39.dna.primary_assembly.fa.gz
  checksum:
    sha256: compute_on_registration

seqcol:
  compute: true

