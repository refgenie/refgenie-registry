name: fasta_index
version: 1.0.0
description: |
  Creates a FASTA index (.fai) and chromosome sizes file using
  samtools faidx. The .fai file enables random access to sequences
  within the FASTA. The chrom.sizes file lists each sequence name
  and its length, required by many tools (bedtools, UCSC utilities).
tags:
- index
- reference
- foundational
requires:
  assets:
  - name: fasta
    description: Reference FASTA file
  tools:
  - name: samtools
    version: '>=1.17'
    source: bioconda
build:
  command: |
    samtools faidx {fasta}
    cp {fasta}.fai {output_dir}/{genome}.fa.fai
    cut -f1,2 {output_dir}/{genome}.fa.fai > {output_dir}/{genome}.chrom.sizes
  resources:
    memory: 2GB
    disk: 1GB
    time: 30m
outputs:
- pattern: '*.fa.fai'
  description: FASTA index file (samtools format)
- pattern: '*.chrom.sizes'
  description: Chromosome/sequence sizes (name<tab>length)
test:
  commands:
  - test -f {output_dir}/{genome}.fa.fai
  - test -f {output_dir}/{genome}.chrom.sizes
  - test "$(wc -l < {output_dir}/{genome}.fa.fai)" -gt 0
  - test "$(wc -l < {output_dir}/{genome}.chrom.sizes)" -gt 0
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
