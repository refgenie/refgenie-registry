name: blacklist
version: 0.0.1
output_asset_class: blacklist
description: |
  Atypical, unstructured, or high signal genomic regions present in
  next-generation sequencing experiments (e.g. from ENCODE). Regions
  in this file should typically be excluded from analysis.
input_files:
  blacklist:
    description: gzipped blacklist file
input_params: {}
input_assets: {}
docker_image: databio/refgenie
command_templates:
  - cp {{values.files["blacklist"]}} {{values.output_folder}}/{{values.genome_digest}}_blacklist.bed.gz
default_asset: "default"

tags:
- qc
- filtering
- encode
outputs:
- pattern: '*_blacklist.bed.gz'
  description: Blacklist regions BED file (gzipped)
test:
  commands:
  - test -f {output_dir}/{genome}_blacklist.bed.gz
resources:
  memory: 1GB
  disk: 1GB
  time: 10m
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
