name: blacklist
version: 0.0.1
description: |
  Atypical, unstructured, or high signal genomic regions present in
  next-generation sequencing experiments (e.g. from ENCODE). Regions
  in this file should typically be excluded from analysis.
tags:
- qc
- filtering
- encode
requires:
  assets: []
  files:
  - name: blacklist
    description: Gzipped blacklist BED file
  tools: []
build:
  command: |
    cp {blacklist} {output_dir}/{genome}_blacklist.bed.gz
  resources:
    memory: 1GB
    disk: 1GB
    time: 10m
outputs:
- pattern: '*_blacklist.bed.gz'
  description: Blacklist regions BED file (gzipped)
test:
  commands:
  - test -f {output_dir}/{genome}_blacklist.bed.gz
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
