name: feat_annotation
version: 0.0.1
description: |
  Combined genomic feature annotation created using an Ensembl GTF annotation
  asset and an Ensembl regulatory build annotation asset. Produces a combined
  BED file with exons, introns, UTRs, promoters, and enhancers.
tags:
- annotation
- genomic-features
- ensembl
produces: feat_annotation
requires:
  assets:
  - name: ensembl_gtf
    description: Annotation file in GTF format from Ensembl
  - name: ensembl_rb
    description: Regulatory annotation file in GFF format from Ensembl
  tools: []
build:
  command: |
    gzip -dcf {ensembl_gtf} | awk '$3=="exon"' | grep -v 'pseudogene' | awk -v OFS='\t' '{{print "chr"$1, $4-1, $5, "Exon", $6, $7}}' | awk '$2<$3' | env LC_COLLATE=C sort -k1,1 -k2,2n -k3,3n -u > {output_dir}/{genome}_exons.bed
    gzip -dcf {ensembl_gtf} | awk '$3=="exon"' | grep -v 'pseudogene' | awk -v OFS='\t' '{{ split($20, a, "\""); print "chr"$1, $4-1, $5, a[2], $6, $7}}' | env LC_COLLATE=C sort -k1,1 -k2,2n -k3,3n -u | awk 'seen[$4]++ && seen[$4] > 1' | env LC_COLLATE=C sort -k1,1 -k2,2n -k3,3nr | env LC_COLLATE=C sort -k1,1 -k2,2n -u | env LC_COLLATE=C sort -k1,1 -k3,3n -u | awk -v OFS='\t' '{{if($4==prev4){{new2=prev3+1;}} {{prev4=$4; prev3=$3; print $1, new2, $2-1, "Intron", $5, $6}}}}' | awk -F'\t' '$2' | awk '$2<$3' | env LC_COLLATE=C sort -k1,1 -k2,2n -u > {output_dir}/{genome}_introns.bed
    gzip -dcf {ensembl_gtf} | awk '$3=="three_prime_utr"' | grep -v 'pseudogene' | awk -v OFS='\t' '{{print "chr"$1, $4-1, $5, "3\x27 UTR", $6, $7}}' | awk '$2<$3' | env LC_COLLATE=C sort -k1,1 -k2,2n -u > {output_dir}/{genome}_3utr.bed
    gzip -dcf {ensembl_gtf} | awk '$3=="five_prime_utr"' | grep -v 'pseudogene' | awk -v OFS='\t' '{{print "chr"$1, $4-1, $5, "5\x27 UTR", $6, $7}}' | awk '$2<$3' | env LC_COLLATE=C sort -k1,1 -k2,2n -u > {output_dir}/{genome}_5utr.bed
    gzip -dcf {ensembl_rb} | awk '$3=="promoter"' | awk -v OFS='\t' '{{print "chr"$1, $4, $5, "Promoter", $6, $7}}' | awk '$2<$3' | env LC_COLLATE=C sort -k1,1 -k2,2n -k3,3n -u > {output_dir}/{genome}_promoter.bed
    gzip -dcf {ensembl_rb} | awk '$3=="promoter_flanking_region"' | awk -v OFS='\t' '{{print "chr"$1, $4, $5, "Promoter Flanking Region", $6, $7}}' | awk '$2<$3' | env LC_COLLATE=C sort -k1,1 -k2,2n -k3,3n -u > {output_dir}/{genome}_promoter_flanking.bed
    gzip -dcf {ensembl_rb} | awk '$3=="enhancer"' | awk -v OFS='\t' '{{print "chr"$1, $4, $5, "Enhancer", $6, $7}}' | awk '$2<$3' | env LC_COLLATE=C sort -k1,1 -k2,2n -k3,3n -u > {output_dir}/{genome}_enhancer.bed
    cat {output_dir}/{genome}_enhancer.bed {output_dir}/{genome}_promoter.bed {output_dir}/{genome}_promoter_flanking.bed {output_dir}/{genome}_5utr.bed {output_dir}/{genome}_3utr.bed {output_dir}/{genome}_exons.bed {output_dir}/{genome}_introns.bed | awk -F'\t' '!seen[$1, $2, $3]++' > {output_dir}/{genome}_annotations.bed
    rm -f {output_dir}/{genome}_enhancer.bed {output_dir}/{genome}_promoter.bed {output_dir}/{genome}_promoter_flanking.bed {output_dir}/{genome}_5utr.bed {output_dir}/{genome}_3utr.bed {output_dir}/{genome}_exons.bed {output_dir}/{genome}_introns.bed
    gzip -f {output_dir}/{genome}_annotations.bed
  resources:
    memory: 4GB
    disk: 5GB
    time: 1h
outputs:
- pattern: '*_annotations.bed.gz'
  description: Combined genomic feature annotation file (gzipped)
test:
  commands:
  - test -f {output_dir}/{genome}_annotations.bed.gz
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
