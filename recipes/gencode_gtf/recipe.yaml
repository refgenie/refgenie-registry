name: gencode_gtf
version: 0.0.1
description: |
  GTF annotation asset from Gencode which provides access to all
  annotated transcripts.
tags:
- annotation
- gtf
- gencode
produces: gtf
requires:
  assets: []
  files:
  - name: gtf
    description: Annotation file in Gene Transfer Format (GTF) from Gencode
  tools: []
build:
  command: |
    cp {gtf} {output_dir}/{genome}.gtf.gz
  resources:
    memory: 2GB
    disk: 5GB
    time: 30m
outputs:
- pattern: '*.gtf.gz'
  description: GTF annotation file (gzipped)
test:
  commands:
  - test -f {output_dir}/{genome}.gtf.gz
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
