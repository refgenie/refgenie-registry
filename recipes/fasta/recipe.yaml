name: fasta
version: 0.1.0
description: |
  DNA sequences in the FASTA format, indexed FASTA and chromosome sizes file.
  This is the foundational asset -- most other recipes depend on it.
  The FASTA file contains all reference sequences (chromosomes,
  scaffolds, contigs) for the genome assembly.
tags:
- reference
- sequence
- foundational
produces: fasta
requires:
  assets: []
  tools:
  - name: samtools
    version: '>=1.17'
    source: bioconda
build:
  command: |
    refgenie-build-fasta {refget_store_path} {genome_digest} {output_dir}
  resources:
    memory: 4GB
    disk: 15GB
    time: 1h
outputs:
- pattern: '*.fa'
  description: Reference genome FASTA file
- pattern: '*.fa.fai'
  description: FASTA index file
- pattern: '*.chrom.sizes'
  description: Chromosome sizes file
test:
  commands:
  - test -f {output_dir}/{genome}.fa
  - test -f {output_dir}/{genome}.fa.fai
  - test -f {output_dir}/{genome}.chrom.sizes
  - head -1 {output_dir}/{genome}.fa | grep -q "^>"
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
