name: hisat2_index
version: 0.0.1
description: |
  Genome index for HISAT2, produced with hisat2-build.
  HISAT2 is a fast and sensitive alignment program for mapping
  next-generation sequencing reads to a reference genome.
tags:
- alignment
- rna-seq
- spliced-alignment
produces: hisat2_index
requires:
  assets:
  - name: fasta
    description: FASTA asset for genome
  tools:
  - name: hisat2
    version: '>=2.2.0'
    source: bioconda
build:
  command: |
    hisat2-build {fasta} {output_dir}/{genome}
  resources:
    memory: 8GB
    disk: 10GB
    time: 2h
outputs:
- pattern: '*.ht2'
  description: HISAT2 index files
- pattern: '*.ht2l'
  description: HISAT2 large index files (for genomes >= 4Gbp)
test:
  commands:
  - test -f {output_dir}/{genome}.1.ht2 || test -f {output_dir}/{genome}.1.ht2l
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
