name: salmon_sa_index
version: 0.0.1
description: |
  Transcriptome index for Salmon, produced with salmon index using selective
  alignment method. Improves quantification accuracy compared to the regular
  index by incorporating decoy sequences from the genome.
tags:
- quantification
- rna-seq
- pseudoalignment
- selective-alignment
produces: salmon_sa_index
requires:
  assets:
  - name: fasta
    description: FASTA asset for genome
  - name: fasta_txome
    description: FASTA asset for transcriptome
  tools:
  - name: salmon
    version: '>=1.10.0'
    source: bioconda
build:
  command: |
    grep '^>' {fasta} | cut -d ' ' -f 1 > {output_dir}/decoys.txt
    sed -i.bak -e 's/>//g' {output_dir}/decoys.txt
    rm {output_dir}/decoys.txt.bak
    cat {fasta_txome} {fasta} > {output_dir}/gentrome.fa
    salmon index -t {output_dir}/gentrome.fa -d {output_dir}/decoys.txt -i {output_dir} -k {kmer} -p {threads}
    rm {output_dir}/gentrome.fa {output_dir}/decoys.txt
  resources:
    memory: 16GB
    disk: 20GB
    time: 2h
outputs:
- pattern: '*.json'
  description: Salmon index metadata files
- pattern: seq.bin
  description: Salmon sequence binary
- pattern: pos.bin
  description: Salmon position binary
test:
  commands:
  - test -d {output_dir}
  - test -f {output_dir}/seq.bin
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
