name: bowtie2_index
version: 0.0.1
description: |
  Genome index for bowtie2, produced with bowtie2-build.
  Creates the FM-index files used by bowtie2 for fast and
  memory-efficient alignment of short reads.
tags:
- alignment
- dna-seq
- short-read
produces: bowtie2_index
requires:
  assets:
  - name: fasta
    description: FASTA asset for genome
  tools:
  - name: bowtie2
    version: '>=2.5.0'
    source: bioconda
build:
  command: |
    bowtie2-build --threads {threads} {fasta} {output_dir}/{genome}
  resources:
    memory: 8GB
    disk: 10GB
    time: 2h
outputs:
- pattern: '*.bt2'
  description: Bowtie2 index files (standard, for genomes < 4Gbp)
- pattern: '*.bt2l'
  description: Bowtie2 large index files (for genomes >= 4Gbp)
test:
  commands:
  - test -f {output_dir}/{genome}.1.bt2 || test -f {output_dir}/{genome}.1.bt2l
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
