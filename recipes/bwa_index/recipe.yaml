name: bwa_index
version: 0.0.1
description: |
  Genome index for Burrows-Wheeler Alignment Tool, produced with bwa index.
  Creates the FM-index files required by bwa mem, bwa aln, and other BWA
  alignment commands.
tags:
- alignment
- dna-seq
- short-read
requires:
  assets:
  - name: fasta
    description: FASTA asset for genome
  tools:
  - name: bwa
    version: '>=0.7.18'
    source: bioconda
build:
  command: |
    bwa index {output_dir}/{genome}.fa
  resources:
    memory: 8GB
    disk: 10GB
    time: 2h
outputs:
- pattern: '*.amb'
  description: BWA index - sequence ambiguity information
- pattern: '*.ann'
  description: BWA index - sequence annotation (names, lengths)
- pattern: '*.bwt'
  description: BWA index - Burrows-Wheeler transform
- pattern: '*.pac'
  description: BWA index - packed reference sequence
- pattern: '*.sa'
  description: BWA index - suffix array
test:
  commands:
  - test -f {output_dir}/{genome}.fa.bwt
  - test -f {output_dir}/{genome}.fa.sa
  - test -f {output_dir}/{genome}.fa.amb
  - test -f {output_dir}/{genome}.fa.ann
  - test -f {output_dir}/{genome}.fa.pac
metadata:
  author: nsheff
  created: '2026-05-20'
  license: BSD-2-Clause
