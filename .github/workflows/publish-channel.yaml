name: Publish data channel

# Publish the refgenie data channel (index.yaml + asset_classes/ + recipes/) to
# GitHub Pages in the registry's native layout. refgenie1 clients point their
# data channel directly at the published index.yaml. See tools/build_channel.py.

on:
  push:
    branches: [master]
    paths:
      - "asset_classes/**"
      - "recipes/**"
      - "tools/build_channel.py"
      - "tools/validate_channel.py"
      - ".github/workflows/publish-channel.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build channel
        run: python3 tools/build_channel.py --registry-root . -o channel

      - name: Validate channel
        run: python3 tools/validate_channel.py channel

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: channel

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
