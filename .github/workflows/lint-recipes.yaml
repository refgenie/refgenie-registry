name: Lint Recipes

on:
  pull_request:
    paths:
      - "recipes/**"
      - "asset_classes/**"
      - "schema/recipe.schema.yaml"
      - "schema/asset_class.schema.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-recipes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r tools/requirements.txt
          sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate asset class definitions
        run: |
          python - <<'PY'
          import glob
          import sys
          import yaml
          from jsonschema import Draft202012Validator

          schema_path = "schema/asset_class.schema.yaml"
          try:
              with open(schema_path) as f:
                  schema = yaml.safe_load(f)
          except FileNotFoundError:
              print(f"ERROR: {schema_path} not found")
              sys.exit(1)

          validator = Draft202012Validator(schema)
          files = sorted(glob.glob("asset_classes/*.yaml"))
          if not files:
              print("No asset_classes/*.yaml files found.")
              sys.exit(0)

          failed = False
          for path in files:
              with open(path) as f:
                  data = yaml.safe_load(f)
              errors = [e.message for e in validator.iter_errors(data)]
              if errors:
                  failed = True
                  print(f"FAIL {path}")
                  for e in errors:
                      print(f"  - {e}")
              else:
                  print(f"PASS {path}")
          sys.exit(1 if failed else 0)
          PY

      - name: Cross-check recipe asset-class references
        run: |
          # validate_recipe.py validates each native recipe against
          # schema/recipe.schema.yaml and verifies that `output_asset_class` and
          # every input_assets[].asset_class resolve to an asset_classes/<name>.yaml
          # file. Run across all recipes so an asset-class change re-checks references.
          python tools/validate_recipe.py --no-url-check recipes/*/recipe.yaml

      - name: Identify changed recipe files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'recipes/**/recipe.yaml')
          if [ -z "$FILES" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "No recipe files changed."
          else
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "Changed recipe files:"
            echo "$FILES"
          fi

      - name: Validate recipe files
        if: steps.changed.outputs.files != ''
        id: validate
        run: |
          set +e
          OUTPUT=$(python tools/validate_recipe.py ${{ steps.changed.outputs.files }} 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"
          exit $EXIT_CODE

      - name: Post PR comment on failure
        if: failure() && steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.validate.outputs.output }}`;
            const body = `## Recipe Validation Failed

            \`\`\`
            ${output}
            \`\`\`

            Please fix the errors above and push again. You can run validation locally:
            \`\`\`bash
            pip install -r tools/requirements.txt
            sudo apt-get install shellcheck  # optional but recommended
            python tools/validate_recipe.py <your-recipe.yaml>
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Post PR comment on success
        if: success() && steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Recipe Validation Passed\n\nAll recipe files passed schema, security, and shellcheck validation.'
            });

      - name: Add label on success
        if: success() && steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['programmatic-check-passed']
            });
