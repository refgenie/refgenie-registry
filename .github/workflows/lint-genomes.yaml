name: Lint Genomes

on:
  pull_request:
    paths:
      - "genomes/**"
      - "schema/genome.schema.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-genomes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Identify changed genome files
        id: changed
        run: |
          # Get genome YAML files changed in this PR
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'genomes/**/*.yaml')
          if [ -z "$FILES" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "No genome files changed."
          else
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "Changed genome files:"
            echo "$FILES"
          fi

      - name: Validate genome files
        if: steps.changed.outputs.files != ''
        id: validate
        run: |
          set +e
          OUTPUT=$(python tools/validate_genome.py ${{ steps.changed.outputs.files }} 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"
          exit $EXIT_CODE

      - name: Post PR comment on failure
        if: failure() && steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.validate.outputs.output }}`;
            const body = `## Genome Validation Failed

            \`\`\`
            ${output}
            \`\`\`

            Please fix the errors above and push again. You can run validation locally:
            \`\`\`bash
            pip install -r tools/requirements.txt
            python tools/validate_genome.py <your-genome-file.yaml>
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Post PR comment on success
        if: success() && steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Genome Validation Passed\n\nAll genome files passed schema and content validation.'
            });

      - name: Add label on success
        if: success() && steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['programmatic-check-passed']
            });
