name: Regenerate Manifest

on:
  schedule:
    # Weekly: Sunday at 4am UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate manifest
        run: |
          python3 .github/scripts/regenerate-manifest.py --index-dir index

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet index/manifest.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to manifest."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manifest has changed."
          fi

      - name: Commit updated manifest
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "refgenie-bot"
          git config user.email "refgenie-bot@users.noreply.github.com"
          git add index/manifest.yaml
          git commit -m "index: regenerate manifest (scheduled)"
          git push
